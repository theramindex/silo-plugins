name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without leading v. Defaults to the selected ref."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Download plugin assets
        run: |
          mkdir -p dist
          node <<'EOF'
          const fs = require("fs");
          const path = require("path");

          const tag = "${{ steps.version.outputs.tag }}";
          const assets = [
            ["plugin-darwin-arm64", "plugin-darwin-arm64-silo-local-metadata"],
            ["plugin-linux-amd64", "plugin-linux-amd64-silo-local-metadata"],
            ["plugin-linux-arm64", "plugin-linux-arm64-silo-local-metadata"],
          ];

          async function download(source, target) {
            const url = `https://github.com/theramindex/silo-local-metadata/releases/download/${tag}/${source}`;
            const response = await fetch(url);
            if (!response.ok) {
              throw new Error(`Failed to download ${source}: ${response.status} ${response.statusText}`);
            }
            const data = Buffer.from(await response.arrayBuffer());
            fs.writeFileSync(path.join("dist", target), data);
          }

          Promise.all(assets.map(([source, target]) => download(source, target))).catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

          cd dist
          sha256sum plugin-* > checksums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "The RamIndex Silo plugins $TAG"
          gh release upload "$TAG" dist/plugin-* dist/checksums.txt --clobber
