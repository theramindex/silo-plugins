name: Validate Catalog

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Validate JSON catalog
        run: node scripts/validate-catalog.mjs

      - name: Run Go helper tests
        run: go test ./...
